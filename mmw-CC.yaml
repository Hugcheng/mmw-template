external-controller: 127.0.0.1:9090
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

profile:
  store-selected: true
  store-fake-ip: true

# ===== 嗅探配置 =====
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ===== TUN 模式 =====
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# ===== DNS（家宽极速兼容版）=====
dns:
  enable: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip

  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.market.xiaomi.com"

  nameserver:
    - 119.29.29.29
    - 223.5.5.5

  proxy-server-nameserver:
    - 223.5.5.5
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query

  nameserver-policy:
    geosite:cn:
      - 119.29.29.29
      - 223.5.5.5
    geosite:private:
      - 119.29.29.29
      - 223.5.5.5
    geosite:geolocation-!cn:
      - https://1.1.1.1/dns-query#Global
      - https://dns.google/dns-query#Global



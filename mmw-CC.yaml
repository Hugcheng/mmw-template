# ===== 节点列表 =====
# 链式代理用法示例（接机场时参考）：

# ===== 策略组 =====
proxy-groups:
  - name: Chain
    type: select
    proxies:
      - Have a nice Day😊
      - ❤All the best
      - DIRECT

  - name: AI
    type: select
    include-all: true
    filter: "(?i)(at&t|\\batt\\b|verizon|vzw|\\bt-?mobile|\\btmo\\b)"
    proxies:
      -  Have a nice Day😊
      - ❤All the best
      - Global
      - DIRECT

  - name: Global
    type: select
    include-all: true
    proxies:
      -  Have a nice Day😊
      - ❤All the best
      - DIRECT
      - REJECT

# ===== 规则分流 =====
rules:
  - RULE-SET,Lan,DIRECT
  - GEOSITE,category-ads-all,REJECT
  - GEOSITE,private,DIRECT
  - DOMAIN-KEYWORD,torrent,DIRECT
  - DOMAIN-SUFFIX,m-team.cc,DIRECT
  - RULE-SET,BiliBili,DIRECT
  - RULE-SET,SteamCN,DIRECT

  # ===== Apple 服务自定义分流 =====
  # App Store 走代理
  - DOMAIN-SUFFIX,apps.apple.com,Global
  - DOMAIN-SUFFIX,itunes.apple.com,Global
  - DOMAIN-SUFFIX,mzstatic.com,Global
  - DOMAIN-SUFFIX,appstoreconnect.apple.com,Global
  # iMessage / FaceTime 走代理(国外通信对方需要)
  - DOMAIN-SUFFIX,facetime.apple.com,Global
  - DOMAIN-SUFFIX,imessage.apple.com,Global
  - DOMAIN-SUFFIX,ess.apple.com,Global
  - DOMAIN-SUFFIX,ist.apple.com,Global
  - DOMAIN-KEYWORD,facetime,Global
  - DOMAIN-KEYWORD,imessage,Global
  # iCloud 走代理(同步速度更快,但流量大)
  - DOMAIN-SUFFIX,icloud.com,Global
  - DOMAIN-SUFFIX,icloud-content.com,Global
  - DOMAIN-SUFFIX,icloud.com.cn,DIRECT       # 中国 iCloud(云上贵州)保持直连
  - DOMAIN-SUFFIX,me.com,Global
  
  # ===== T-Mobile Wi-Fi Calling → 走美国节点(放在 AI 块前)=====
  # ⚠️ 端口规则放最前,确保 IPsec 隧道流量优先命中
  - DST-PORT,500,AI
  - DST-PORT,4500,AI
  - DOMAIN-KEYWORD,epdg,AI
  - DOMAIN-KEYWORD,3gppnetwork,AI
  - DOMAIN-SUFFIX,3gppnetwork.org,AI

  # ===== AI 服务统一走 ATT / Verizon 节点 =====
  # ⚠️ 必须放在 Google / Microsoft / GlobalMedia 等通用规则之前，否则会被先匹配走 Global
  # --- AI 聊天/模型服务 ---
  - DOMAIN-SUFFIX,anthropic.com,AI
  - DOMAIN-SUFFIX,claude.ai,AI
  - DOMAIN-SUFFIX,claude.com,AI
  - DOMAIN-SUFFIX,x.ai,AI
  - DOMAIN-SUFFIX,grok.com,AI
  - DOMAIN-SUFFIX,perplexity.ai,AI
  - DOMAIN-KEYWORD,perplexity,AI
  # --- AI 编程工具 (Cursor / Antigravity / Codex / Claude Code) ---
  - DOMAIN-SUFFIX,cursor.com,AI
  - DOMAIN-SUFFIX,cursor.sh,AI
  - DOMAIN-KEYWORD,cursor,AI
  - DOMAIN-SUFFIX,antigravity.google,AI
  - DOMAIN-KEYWORD,antigravity,AI
  - DOMAIN,codex.openai.com,AI
  - DOMAIN-KEYWORD,codex,AI
  # Claude Code 走 api.anthropic.com，已被上方 anthropic.com 规则覆盖
  # --- 规则集 ---
  - RULE-SET,OpenAI,AI
  - RULE-SET,Claude,AI
  - RULE-SET,Gemini,AI
  - RULE-SET,Copilot,AI

  - RULE-SET,Apple,DIRECT
  - RULE-SET,ChinaMax,DIRECT
  - RULE-SET,Netflix,Global
  - RULE-SET,Disney,Global
  - RULE-SET,TikTok,Global
  - RULE-SET,Steam,Global
  - RULE-SET,Google,Global
  - RULE-SET,Telegram,Global
  - RULE-SET,Microsoft,Global
  - RULE-SET,PayPal,Global
  - RULE-SET,GlobalMedia,Global
  - MATCH,Global
# ===== 外部规则集 (完美合并版) =====
